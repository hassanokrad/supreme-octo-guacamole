name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pulseboard:latest
            ghcr.io/${{ github.repository_owner }}/pulseboard:${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Deploy on production host
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            export IMAGE=ghcr.io/${{ github.repository_owner }}/pulseboard:${{ github.event.workflow_run.head_sha || github.sha }}
            cd /opt/pulseboard
            docker pull "$IMAGE"
            IMAGE="$IMAGE" docker compose -f infra/docker-compose.prod.yml up -d --force-recreate
            docker image prune -af

      - name: Verify deployment health
        run: |
          curl -fsS "${{ secrets.PROD_HEALTHCHECK_URL }}" >/dev/null
